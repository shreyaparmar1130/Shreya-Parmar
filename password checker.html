<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Password Strength Checker</title>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: Arial, sans-serif;
    }

    body {
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      background: linear-gradient(135deg, #4facfe, #00f2fe);
    }

    .container {
      background: white;
      padding: 30px;
      width: 350px;
      border-radius: 12px;
      box-shadow: 0 10px 25px rgba(0,0,0,0.2);
    }

    .container h2 {
      text-align: center;
      margin-bottom: 20px;
      color: #333;
    }

    .input-box {
      position: relative;
    }

    .input-box input {
      width: 100%;
      padding: 12px;
      border: 2px solid #ccc;
      border-radius: 8px;
      outline: none;
      font-size: 16px;
    }

    .strength-bar {
      width: 100%;
      height: 10px;
      background: #eee;
      border-radius: 10px;
      margin-top: 15px;
      overflow: hidden;
    }

    .strength-fill {
      height: 100%;
      width: 0%;
      transition: 0.4s;
      border-radius: 10px;
    }

    .message {
      margin-top: 12px;
      text-align: center;
      font-weight: bold;
      color: #444;
    }

    ul {
      margin-top: 15px;
      padding-left: 20px;
      font-size: 14px;
      color: #555;
    }

    ul li {
      margin-bottom: 5px;
    }

    .show-btn {
      position: absolute;
      right: 10px;
      top: 12px;
      cursor: pointer;
      font-size: 14px;
      color: #007bff;
      user-select: none;
    }
  </style>
</head>
<body>

  <div class="container">
    <h2>Password Strength Checker</h2>

    <div class="input-box">
      <input type="password" id="password" placeholder="Enter password">
      <span class="show-btn" id="toggleBtn">Show</span>
    </div>

    <div class="strength-bar">
      <div class="strength-fill" id="strengthFill"></div>
    </div>

    <div class="message" id="message">Enter a password</div>

    <ul>
      <li>At least 8 characters</li>
      <li>Uppercase & lowercase letters</li>
      <li>At least one number</li>
      <li>At least one special character</li>
    </ul>
  </div>

  <script>
    const password = document.getElementById("password");
    const strengthFill = document.getElementById("strengthFill");
    const message = document.getElementById("message");
    const toggleBtn = document.getElementById("toggleBtn");

    password.addEventListener("input", checkStrength);

    function checkStrength() {
      const value = password.value;
      let strength = 0;

      // Conditions
      if (value.length >= 8) strength++;
      if (/[A-Z]/.test(value) && /[a-z]/.test(value)) strength++;
      if (/[0-9]/.test(value)) strength++;
      if (/[^A-Za-z0-9]/.test(value)) strength++;

      switch(strength) {
        case 0:
          strengthFill.style.width = "0%";
          message.textContent = "Enter a password";
          break;

        case 1:
          strengthFill.style.width = "25%";
          strengthFill.style.background = "red";
          message.textContent = "Weak Password";
          break;

        case 2:
          strengthFill.style.width = "50%";
          strengthFill.style.background = "orange";
          message.textContent = "Medium Password";
          break;

        case 3:
          strengthFill.style.width = "75%";
          strengthFill.style.background = "#ffd700";
          message.textContent = "Good Password";
          break;

        case 4:
          strengthFill.style.width = "100%";
          strengthFill.style.background = "green";
          message.textContent = "Strong Password";
          break;
      }
    }

    // Show/Hide Password
    toggleBtn.addEventListener("click", () => {
      if (password.type === "password") {
        password.type = "text";
        toggleBtn.textContent = "Hide";
      } else {
        password.type = "password";
        toggleBtn.textContent = "Show";
      }
    });
  </script>

</body>
</html>
